<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting Akun Sistem Baru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm flex items-center justify-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-md shadow-blue-200 text-xl">🗳️</div>
        <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">E-Voting Pemilihan Ketua OSIS</h1>
    </header>

    <!-- Konten Utama -->
    <main class="container mx-auto p-4 max-w-6xl flex-grow flex items-center justify-center py-10">
        
        <!-- JENDELA 1: FORM LOGIN AKUN SISWA -->
        <div id="box-login" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 transition-all">
            <h2 class="text-xl font-bold text-slate-800 mb-1">Login Pemilih</h2>
            <p class="text-xs text-slate-400 mb-6">Silakan masuk menggunakan akun resmi dari panitia OSIS.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Username / NIS</label>
                    <input type="text" id="username" placeholder="Masukkan Username" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition-all">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition-all">
                </div>
                <button onclick="prosesLoginSiswa()" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 transition-all transform active:scale-[0.98]">
                    Masuk ke Bilik Suara
                </button>
            </div>
        </div>

        <!-- JENDELA 2: BILIK SUARA (DAFTAR KANDIDAT) -->
        <div id="box-bilik-suara" class="hidden w-full">
            <div class="text-center mb-8">
                <span class="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-widest border border-blue-100">Surat Suara Digital</span>
                <h2 class="text-2xl font-extrabold text-slate-800 mt-2">Gunakan Hak Suara Anda Secara Bijak</h2>
                <p id="display-username" class="text-sm text-slate-400 mt-1">Akun: --</p>
            </div>
            
            <!-- PERBAIKAN LAYOUT: Diubah dari grid-cols-2 menjadi md:grid-cols-3 agar berjejer 3 kolom -->
            <div id="container-kandidat" class="grid grid-cols-1 md:grid-cols-3 gap-6 items-stretch">
                <!-- Data Paslon Di-inject Otomatis Di Sini -->
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center p-4 border-t border-slate-200/50 bg-white text-xs font-semibold text-slate-400">
        &copy; 2026 Panitia Pemilihan Umum OSIS. All Rights Reserved.
    </footer>

    <script>
        // ======= TEMPELKAN kembali URL GOOGLE APPS SCRIPT ANDA DI SINI =======
        const GAS_VOTING_URL = "https://script.google.com/macros/s/AKfycbzHIlB5eK4Kky6_4AiDyh9WV9oWjTXSWNVCsmghyWI2b4RpbZlo9aBTLxZfkyx8X0B8/exec"; 
        // ====================================================================

        let sessionUsername = "";
        let sessionPassword = "";

        function prosesLoginSiswa() {
            const uInput = document.getElementById('username').value.trim();
            const pInput = document.getElementById('password').value.trim();
            
            if(!uInput || !pInput) return alert('Username dan Password wajib diisi!');
            
            const btn = document.getElementById('btn-login');
            btn.innerText = "Memverifikasi Akun...";
            btn.disabled = true;

            sessionUsername = uInput;
            sessionPassword = pInput;

            fetch(GAS_VOTING_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    action: "login",
                    username: sessionUsername,
                    password: sessionPassword
                })
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    if(res.sudahVote) {
                        alert(`🚫 Akses Ditolak:\n${res.error}`);
                        window.location.reload();
                    } else {
                        muatDaftarKandidat();
                    }
                } else {
                    alert(`⚠️ Gagal Masuk:\n${res.error}`);
                    window.location.reload();
                }
            })
            .catch(err => alert("Terjadi gangguan koneksi: " + err.message))
            .finally(() => {
                btn.innerText = "Masuk ke Bilik Suara";
                btn.disabled = false;
            });
        }

        function muatDaftarKandidat() {
            fetch(`${GAS_VOTING_URL}?t=${new Date().getTime()}`)
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    document.getElementById('display-username').innerText = `Login Sebagai: ${sessionUsername}`;
                    let htmlCard = "";
                    
                    res.data.forEach(paslon => {
                        htmlCard += `
                            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-all text-center flex flex-col justify-between h-full">
                                <div>
                                    <!-- Nomor Paslon -->
                                    <div class="w-12 h-12 bg-blue-50 border border-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-xl font-black mx-auto mb-3">
                                        0${paslon.id}
                                    </div>
                                    
                                    <!-- Foto Kandidat -->
                                    <div class="w-full h-56 bg-slate-100 rounded-xl overflow-hidden mb-4 border border-slate-100">
                                        <img src="${paslon.foto}" alt="Foto ${paslon.nama}" class="w-full h-full object-cover object-center">
                                    </div>

                                    <!-- Nama Kandidat -->
                                    <h3 class="text-base font-extrabold text-slate-800 tracking-tight px-1 mb-3">${paslon.nama}</h3>
                                    
                                    <!-- Visi & Misi -->
                                    <div class="text-left bg-slate-50 border border-slate-100 p-4 rounded-xl mb-5 min-h-[120px]">
                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Visi & Misi</span>
                                        <p class="text-slate-600 text-xs leading-relaxed whitespace-pre-line">${paslon.visi_misi}</p>
                                    </div>
                                </div>
                                
                                <!-- Tombol Coblos -->
                                <button onclick="eksekusiVoting(${paslon.id})" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-md shadow-emerald-100 transition-all transform active:scale-[0.98]">
                                    Coblos Paslon 0${paslon.id}
                                </button>
                            </div>
                        `;
                    });
                    
                    document.getElementById('container-kandidat').innerHTML = htmlCard;
                    document.getElementById('box-login').classList.add('hidden');
                    document.getElementById('box-bilik-suara').classList.remove('hidden');
                }
            })
            .catch(err => alert("Gagal mengambil data kandidat: " + err.message));
        }

        function eksekusiVoting(idPaslon) {
            if(!confirm(`Apakah Anda yakin memilih Paslon 0${idPaslon}?`)) return;

            fetch(GAS_VOTING_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    action: "vote",
                    username: sessionUsername,
                    pilihan_id: idPaslon
                })
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    alert("🎉 Sukses! Pilihan Anda berhasil direkam.");
                    window.location.reload();
                } else {
                    alert(`🚫 Gagal: ${res.error}`);
                    window.location.reload();
                }
            })
            .catch(err => alert("Gagal mengirim suara: " + err.message));
        }
    </script>
</body>
</html>
