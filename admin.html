<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Realtime Count OSIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library Grafik Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- Header Admin -->
    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 shadow-md flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-white text-xl shadow-lg shadow-emerald-900/30">📊</div>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight">Dashboard Real-Time Count</h1>
                <p class="text-[11px] text-slate-400 font-medium">Panitia Pemilihan Ketua OSIS</p>
            </div>
        </div>
        <button onclick="muatDataGrafik()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-4 py-2 rounded-xl shadow-md transition-all flex items-center gap-1.5 active:scale-95">
            🔄 Refresh Data
        </button>
    </header>

    <!-- Konten Utama Dashboard -->
    <main class="container mx-auto p-6 max-w-6xl flex-grow space-y-6">
        
        <!-- Widget Informasi Total Suara Masuk -->
        <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl flex items-center justify-between shadow-xl">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Total Suara Masuk Saat Ini</p>
                <h2 id="total-suara" class="text-4xl font-black text-emerald-400 mt-1">0 <span class="text-lg font-semibold text-slate-400">Suara</span></h2>
            </div>
            <div class="text-right">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 animate-pulse">
                    🟢 Live Terhubung Ke Google Sheets
                </span>
            </div>
        </div>

        <!-- Grid Tampilan Grafik -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Grafik Batang (Besar - Kiri) -->
            <div class="lg:col-span-2 bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-xl flex flex-col justify-between">
                <h3 class="text-sm font-bold text-slate-300 mb-4 uppercase tracking-wider">Perbandingan Perolehan Angka</h3>
                <div class="w-full h-80 flex items-center justify-center">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <!-- Grafik Lingkaran (Kanan) -->
            <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-xl flex flex-col justify-between">
                <h3 class="text-sm font-bold text-slate-300 mb-4 uppercase tracking-wider">Persentase Porsi (%)</h3>
                <div class="w-full h-80 flex items-center justify-center p-2">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>

        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center p-4 border-t border-slate-800 bg-slate-850 text-[11px] font-semibold text-slate-500">
        &copy; 2026 Admin Panel E-Voting OSIS. Secure Connection Enabled.
    </footer>

    <script>
        // ======= TEMPELKAN URL APPS SCRIPT ANDA DI SINI =======
        const GAS_VOTING_URL = "https://script.google.com/macros/s/AKfycbzHIlB5eK4Kky6_4AiDyh9WV9oWjTXSWNVCsmghyWI2b4RpbZlo9aBTLxZfkyx8X0B8/exec";
        // =====================================================

        let barChartInstance = null;
        let pieChartInstance = null;

        function muatDataGrafik() {
            // Ambil data dengan parameter admin agar sistem menghitung suara
            fetch(`${GAS_VOTING_URL}?view=admin&t=${new Date().getTime()}`)
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    document.getElementById('total-suara').innerHTML = `${res.total_pemilih} <span class="text-lg font-semibold text-slate-400">Suara</span>`;
                    
                    // Ekstrak data untuk keperluan grafik
                    const labelKandidat = res.data.map(k => `0${k.id} - ${k.nama}`);
                    const jumlahSuara = res.data.map(k => k.suara);
                    
                    renderCharts(labelKandidat, jumlahSuara);
                }
            })
            .catch(err => alert("Gagal mengambil data real-count: " + err.message));
        }

        function renderCharts(labels, dataSuara) {
            const chartColors = [
                'rgba(59, 130, 246, 0.85)',  // Biru (Paslon 1)
                'rgba(245, 158, 11, 0.85)',  // Oranye (Paslon 2)
                'rgba(168, 85, 247, 0.85)'   // Ungu (Paslon 3)
            ];
            const borderColors = ['#3b82f6', '#f59e0b', '#a855f7'];

            // ---- 1. RENDER BAR CHART ----
            if(barChartInstance) barChartInstance.destroy(); // Hancurkan chart lama sebelum buat baru
            const ctxBar = document.getElementById('barChart').getContext('2d');
            barChartInstance = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Jumlah Suara',
                        data: dataSuara,
                        backgroundColor: chartColors,
                        borderColor: borderColors,
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#94a3b8', stepSize: 1 },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { display: false }
                        }
                    }
                }
            });

            // ---- 2. RENDER PIE CHART ----
            if(pieChartInstance) pieChartInstance.destroy();
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            pieChartInstance = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataSuara,
                        backgroundColor: chartColors,
                        borderColor: '#1e293b',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#94a3b8', font: { size: 11 } }
                        }
                    }
                }
            });
        }

        // Panggil fungsi otomatis saat halaman admin terbuka pertama kali
        window.onload = muatDataGrafik;
    </script>
</body>
</html>
